name: bench

on:
  pull_request:
    paths:
      - ".github/workflows/bench.yml"
      - "crates/**"
      - "Cargo.lock"
      - "Cargo.toml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/bench.yml"
      - "crates/**"
      - "Cargo.lock"
      - "Cargo.toml"
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
        with:
          toolchain: stable

      - name: Cache corpus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: crates/djls-corpus/.corpus
          key: ${{ runner.os }}-corpus-${{ hashFiles('crates/djls-corpus/manifest.lock') }}
          restore-keys: |
            ${{ runner.os }}-corpus-

      - name: Sync corpus
        run: cargo run -q -p djls-corpus -- sync

      - run: cargo install cargo-codspeed --locked

      - name: Build the benchmark target(s)
        run: cargo codspeed build -p djls-bench

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@db35df748deb45fdef0960669f57d627c1956c30
        with:
          mode: instrumentation
          run: cargo codspeed run -p djls-bench

name: bench

on:
  pull_request:
    paths:
      - ".github/workflows/bench.yml"
      - "crates/**"
      - "Cargo.lock"
      - "Cargo.toml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/bench.yml"
      - "crates/**"
      - "Cargo.lock"
      - "Cargo.toml"
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          toolchain: stable

      - name: Cache corpus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: crates/djls-corpus/.corpus
          key: ${{ runner.os }}-corpus-${{ hashFiles('crates/djls-corpus/manifest.lock') }}
          restore-keys: |
            ${{ runner.os }}-corpus-

      - name: Sync corpus
        run: cargo run -q -p djls-corpus -- sync

      - run: cargo install cargo-codspeed --locked

      - name: Build the benchmark target(s)
        run: cargo codspeed build -p djls-bench

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@9d332c4d90b43981c3e55ae8e38e68709996240f
        with:
          mode: instrumentation
          run: cargo codspeed run -p djls-bench

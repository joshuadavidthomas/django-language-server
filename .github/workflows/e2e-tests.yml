name: End-to-End Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        django-version: ['4.2', '5.0', '5.1']
        exclude:
          # Add any incompatible combinations here if needed
          # - python-version: '3.9'
          #   django-version: '5.1'

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    
    - name: Build django-language-server
      run: |
        pip install maturin
        maturin develop --release
    
    - name: Test with tox
      run: tox
      env:
        DJANGO_VERSION: ${{ matrix.django-version }}
        PYTHONPATH: ${{ github.workspace }}

  # Optional: Add a job for testing with different clients
  client-tests:
    name: Client Tests - ${{ matrix.client }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        client: ['vscode', 'neovim']
        include:
          - client: vscode
            client-setup: |
              # Setup for VS Code testing
              echo "Setting up VS Code for testing"
          - client: neovim
            client-setup: |
              # Setup for Neovim testing
              echo "Setting up Neovim for testing"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
    
    - name: Set up client
      run: ${{ matrix.client-setup }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r tests/requirements-test.txt
        python -m pip install Django>=5.0,<5.1
    
    - name: Build django-language-server
      run: |
        pip install maturin
        maturin develop --release
    
    - name: Run client tests
      run: |
        pytest tests/clients/test_${{ matrix.client }}.py
# cargo-stow configuration
# Validates workspace structure, naming conventions, and dependency rules.
#
# Vendored in djls-dev with hyphen separator support.
# Usage:   cargo run -p djls-dev --bin cargo-stow -- stow           (validate)
#          cargo run -p djls-dev --bin cargo-stow -- stow --fix     (auto-fix sorting)
#          cargo run -p djls-dev --bin cargo-stow -- stow --graph architecture/architecture.svg

# Logical namespaces for architecture diagram grouping.

# Core analysis: everything from foundation types to IDE features
[[namespaces]]
name = "djls"
approved_prefixes = []
test_crate_exceptions = []
name_exceptions = { "djls-source" = "djls-source", "djls-conf" = "djls-conf", "djls-python" = "djls-python", "djls-workspace" = "djls-workspace", "djls-templates" = "djls-templates", "djls-project" = "djls-project", "djls-semantic" = "djls-semantic", "djls-ide" = "djls-ide", "djls-db" = "djls-db", "djls-server" = "djls-server", "djls" = "djls" }

# Dev tools: bench, corpus, dev tooling
[[namespaces]]
name = "djls-tools"
approved_prefixes = []
test_crate_exceptions = []
name_exceptions = { "djls-bench" = "djls-bench", "djls-corpus" = "djls-corpus", "djls-dev" = "djls-dev" }
link_crates = ["djls-ide", "djls-corpus"]

[graph]
external_deps = ["salsa", "tower-lsp-server", "tokio"]

[graph.implied_deps]
djls-conf = ["anyhow", "camino", "serde", "thiserror"]
djls-source = ["camino", "salsa", "serde", "thiserror"]

# Profiles for static Django project model validation.
#
# These profiles turn real corpus projects, plus contributed regression shapes,
# into explicit test inputs. They avoid guessing the active settings file in
# production tests and keep multi-environment projects separate before any unioned
# completion data is assembled.

[[profile]]
id = "archivebox"
description = "Project settings with dynamic branches, local archivebox apps, external apps, and app template libraries."
source_roots = ["."]
django_settings_file_patterns = []

[profile.source]
kind = "corpus"
path = "repos/archivebox"

[[profile.django_environment]]
root = "."
settings_file = "archivebox/core/settings.py"
settings_module = "archivebox.core.settings"
extends_files = []
installed_apps_confidence = "partial"
templates_confidence = "known"
expected_partial_reasons = ["dynamic if condition controls settings mutation"]

[profile.django_environment.expected]
installed_apps = [
  "daphne",
  "django.contrib.admin",
  "archivebox.machine",
  "archivebox.workers",
  "archivebox.personas",
  "archivebox.core",
  "archivebox.crawls",
  "archivebox.api",
  "django_extensions",
]
local_apps = [
  "archivebox.machine",
  "archivebox.workers",
  "archivebox.personas",
  "archivebox.core",
  "archivebox.crawls",
  "archivebox.api",
]
external_apps = [
  "daphne",
  "django.contrib.admin",
  "django_extensions",
]
template_dirs = ["archivebox/templates"]
templatetag_modules = [
  "archivebox.core.templatetags.config_tags",
  "archivebox.core.templatetags.core_tags",
]


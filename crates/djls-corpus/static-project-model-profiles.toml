  "clientname.app3.templatetags.app3_tags",
]

[profile.expected_union]
installed_apps = [
  "django.contrib.auth",
  "django.contrib.contenttypes",
  "clientname.app1",
  "clientname.app2",
  "clientname.app3",
]
local_apps = [
  "clientname.app1",
  "clientname.app2",
  "clientname.app3",
]

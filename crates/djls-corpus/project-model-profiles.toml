[[profile]]
id = "gh401-multisite-split-settings"
description = "Contributed regression shape from GH-401: one monorepo with two Django projects, split settings, glob-discovered Django environments, and different app subsets."
source_roots = ["apps", "projects"]
django_settings_file_patterns = ["projects/*/settings/dev.py"]

[profile.source]
kind = "fixture"
path = "gh401-multisite"

[[profile.django_environment]]
root = "projects/site1"
settings_file = "projects/site1/settings/dev.py"
settings_module = "site1.settings.dev"
extends_files = ["projects/site1/settings/base.py"]
installed_apps_confidence = "known"
templates_confidence = "known"
expected_partial_reasons = []

[profile.django_environment.expected]
local_apps = [
  "clientname.app1",
  "clientname.app2",
]
site_package_modules = [
  "django.contrib.auth",
  "django.contrib.contenttypes",
]
template_dirs = ["projects/site1/templates"]
templatetag_modules = [
  "clientname.app1.templatetags.app1_tags",
  "clientname.app2.templatetags.app2_tags",
]

[[profile.django_environment]]
root = "projects/site2"
settings_file = "projects/site2/settings/dev.py"
settings_module = "site2.settings.dev"
extends_files = ["projects/site2/settings/base.py"]
installed_apps_confidence = "known"
templates_confidence = "known"
expected_partial_reasons = []

[profile.django_environment.expected]
local_apps = [
  "clientname.app2",
  "clientname.app3",
]
site_package_modules = [
  "django.contrib.auth",
  "django.contrib.contenttypes",
]
template_dirs = ["projects/site2/templates"]
templatetag_modules = [
  "clientname.app2.templatetags.app2_tags",
  "clientname.app3.templatetags.app3_tags",
]

[profile.expected_union]
local_apps = [
  "clientname.app1",
  "clientname.app2",
  "clientname.app3",
]
site_package_modules = [
  "django.contrib.auth",
  "django.contrib.contenttypes",
]
template_dirs = [
  "projects/site1/templates",
  "projects/site2/templates",
]
templatetag_modules = [
  "clientname.app1.templatetags.app1_tags",
  "clientname.app2.templatetags.app2_tags",
  "clientname.app3.templatetags.app3_tags",
]
